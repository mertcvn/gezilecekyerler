<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📍 İstanbul Yakınımdaki Yerler | Keşfet</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Üst Bar -->
  <header class="glass">
    <div class="logo">
      <i class="fa-solid fa-location-dot"></i>
      <span>İstanbul Gezi Rehberi</span>
    </div>
    <div class="header-actions">
      <button id="gpsBtn" title="GPS ile konumumu bul"><i class="fa-solid fa-crosshairs"></i> Yakınımda</button>
      <button id="themeToggle" title="Tema değiştir"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>

  <!-- Ana İçerik -->
  <main>
    <!-- Arama Bölümü -->
    <div class="search-section glass">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="locationInput" placeholder="Semt, mahalle veya ilçe yazın..." autocomplete="off" />
        <button id="searchBtn"><span class="btn-text">Ara</span><span class="spinner hidden"><i class="fa-solid fa-spinner fa-spin"></i></span></button>
      </div>
      <!-- Arama Geçmişi -->
      <div id="historyTags" class="history-tags"></div>
      <!-- Filtreler -->
      <div class="filters">
        <select id="categoryFilter">
          <option value="all">Tüm Kategoriler</option>
          <option value="müze">🏛️ Müze</option>
          <option value="park">🌳 Park</option>
          <option value="tarihi">🏰 Tarihi</option>
          <option value="manzara">🌅 Manzara</option>
          <option value="alışveriş">🛍️ Alışveriş</option>
          <option value="kültür">🎭 Kültür</option>
          <option value="yeme içme">🍽️ Yeme-İçme</option>
          <option value="sahil">🏖️ Sahil</option>
        </select>
        <select id="sortBy">
          <option value="distance">En Yakın</option>
          <option value="name">İsme Göre (A-Z)</option>
        </select>
        <button id="fullscreenMapBtn"><i class="fa-solid fa-expand"></i> Tam Ekran Harita</button>
      </div>
    </div>

    <!-- İçerik Grid -->
    <div class="content-grid" id="contentGrid">
      <!-- Harita -->
      <div id="mapContainer" class="map-container glass">
        <div id="map"></div>
        <button id="closeFullscreen" class="hidden"><i class="fa-solid fa-compress"></i></button>
      </div>
      <!-- Liste -->
      <div id="listContainer" class="list-container">
        <div id="placesList" class="places-list">
          <div class="empty-state">
            <i class="fa-solid fa-map-location-dot"></i>
            <p>İstanbul'da gezilecek yerleri keşfetmek için bir semt arayın.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Detay Modal -->
  <div id="detailModal" class="modal hidden">
    <div class="modal-content glass">
      <button id="closeModal" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
      <div class="modal-image">
        <img id="modalImage" src="" alt="" />
      </div>
      <div class="modal-info">
        <span id="modalCategory" class="category-badge"></span>
        <h2 id="modalName"></h2>
        <p id="modalDescription"></p>
        <p id="modalDistrict"></p>
        <p id="modalDistance"></p>
        <a id="modalDirections" href="#" target="_blank" class="btn directions-btn">
          <i class="fa-solid fa-route"></i> Yol Tarifi Al
        </a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
