<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>İstanbul Yakınımdaki Yerler</title>
  <meta name="description" content="İstanbul'da semtinize en yakın 10+ gezilecek yeri harita üzerinde keşfedin." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="toast" class="toast hidden" role="alert"></div>

  <header class="header glass" role="banner">
    <div class="logo">
      <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
      <span>İstanbul Gezi Rehberi</span>
    </div>
    <div class="header-actions">
      <button id="gpsBtn" class="icon-btn" title="GPS ile konumumu bul">
        <i class="fa-solid fa-crosshairs"></i><span class="btn-label">Yakınımda</span>
      </button>
      <button id="themeToggle" class="icon-btn" title="Tema değiştir">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </header>

  <main class="main" role="main">
    <section class="search-section glass" aria-label="Konum Ara">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
        <input type="search" id="locationInput" placeholder="Semt, mahalle veya ilçe yazın..." autocomplete="off" aria-label="Konum arama" />
        <button id="searchBtn" class="primary-btn">
          <span class="btn-text">Ara</span>
          <span class="spinner hidden"><i class="fa-solid fa-spinner fa-spin"></i></span>
        </button>
      </div>
      <div id="historyTags" class="history-tags" aria-label="Arama geçmişi"></div>
      <div class="filters">
        <select id="categoryFilter" aria-label="Kategori filtrele">
          <option value="all">Tüm Kategoriler</option>
          <option value="park">🌳 Park</option>
          <option value="tarihi">🏰 Tarihi</option>
          <option value="kültür">🎭 Kültür</option>
          <option value="manzara">🌅 Manzara</option>
          <option value="alışveriş">🛍️ Alışveriş</option>
          <option value="yeme içme">🍽️ Yeme-İçme</option>
          <option value="sahil">🏖️ Sahil</option>
          <option value="müze">🏛️ Müze</option>
        </select>
        <select id="sortBy" aria-label="Sırala">
          <option value="distance">En Yakın</option>
          <option value="name">İsme Göre (A-Z)</option>
        </select>
        <button id="fullscreenMapBtn" class="secondary-btn"><i class="fa-solid fa-expand"></i> Tam Harita</button>
      </div>
    </section>

    <div class="content-grid" id="contentGrid">
      <div id="mapContainer" class="map-container glass">
        <div id="map"></div>
        <button id="closeFullscreen" class="icon-btn hidden" title="Tam ekrandan çık"><i class="fa-solid fa-compress"></i></button>
      </div>
      <aside id="listContainer" class="list-container" aria-label="Yakın mekanlar listesi">
        <div id="placesList" class="places-list">
          <div class="empty-state">
            <i class="fa-solid fa-map-location-dot"></i>
            <p>İstanbul'da gezilecek yerleri keşfetmek için bir semt arayın.</p>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <!-- Detay Modal -->
  <div id="detailModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <div class="modal-content glass">
      <button id="closeModal" class="close-btn" aria-label="Kapat"><i class="fa-solid fa-xmark"></i></button>
      <div class="modal-image">
        <img id="modalImage" src="" alt="" loading="lazy" />
      </div>
      <div class="modal-info">
        <span id="modalCategory" class="category-badge"></span>
        <h2 id="modalName"></h2>
        <p id="modalDescription"></p>
        <p id="modalDistrict"></p>
        <p id="modalDistance"></p>
        <a id="modalDirections" href="#" target="_blank" class="btn directions-btn" rel="noopener">
          <i class="fa-solid fa-route"></i> Yol Tarifi Al
        </a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
